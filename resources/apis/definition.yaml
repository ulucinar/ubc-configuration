apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xnopresources.ulucinar.github.com
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  group: ulucinar.github.com
  names:
    kind: XNopResource
    plural: xnopresources
  claimNames:
    kind: NopResource
    plural: nopresources
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              parameters:
                type: object
                description: NopResource parameters.
                properties:
                  connSecret:
                    type: object
                    description: Connection secret parameters.
                    properties:
                      name:
                        type: string
                        description: Name of the connection secret.
                      namespace:
                        type: string
                        description: Namespace of the connection secret.
                    required:
                    - name
                    - namespace
                required:
                - connSecret
            required:
            - parameters
